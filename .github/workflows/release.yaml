name: Release

on:
  push:
    branches:
      - main

env:
  MONITORED_FILES: "config.json config.yaml config.yml Dockerfile rootfs"

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  init:
    name: Initialize
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
      changed_apps: ${{ steps.filter.outputs.changed_apps }}
      version_bump: ${{ steps.version_check.outputs.version_bump }}
      version: ${{ steps.version_check.outputs.version }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed_files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47

      - name: Find app directories
        id: apps
        uses: home-assistant/actions/helpers/find-addons@f6f29a7ee3fa0eccadf3620a7b9ee00ab54ec03b # master

      - name: Filter changed apps
        id: filter
        env:
          APPS: ${{ steps.apps.outputs.addons_list }}
          CHANGED_FILES: ${{ steps.changed_files.outputs.all_changed_files }}
        run: |
          changed_apps=()

          if [[ "${CHANGED_FILES}" =~ \.github/workflows/release\.yaml ]]; then
            changed_apps=(${APPS})
          else
            for app in ${APPS}; do
              for file in ${MONITORED_FILES}; do
                if [[ "${CHANGED_FILES}" =~ ${app}/${file} ]]; then
                  changed_apps+=("${app}")
                  break
                fi
              done
            done
          fi

          if [[ ${#changed_apps[@]} -gt 0 ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "changed_apps=$(jq -nc '$ARGS.positional' --args "${changed_apps[@]}")" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check version bump
        id: version_check
        run: |
          version=$(grep '^version:' ssh/config.yaml | awk '{print $2}')
          previous_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          echo "version=$version" >> "$GITHUB_OUTPUT"

          if [[ "$version" != "$previous_tag" ]] && [[ -n "$previous_tag" ]]; then
            echo "version_bump=true" >> "$GITHUB_OUTPUT"
          else
            echo "version_bump=false" >> "$GITHUB_OUTPUT"
          fi

  build-app:
    name: Build ${{ matrix.app }}
    needs: init
    if: needs.init.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.init.outputs.changed_apps) }}
    uses: ./.github/workflows/build-app.yaml
    with:
      app: ${{ matrix.app }}
      publish: true
    secrets: inherit

  create-release:
    name: Create Release
    needs: [init, build-app]
    if: needs.init.outputs.version_bump == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        id: changelog
        run: |
          version="${{ needs.init.outputs.version }}"
          previous_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$previous_tag" ]; then
            changes=$(git log --format="- %s" ${previous_tag}..HEAD --not "*/CHANGELOG.md" "*/config.yaml")
          else
            changes=$(git log --format="- %s" -10)
          fi

          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "## $version" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "$changes" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        run: |
          version="${{ needs.init.outputs.version }}"
          changelog="${{ steps.changelog.outputs.changelog }}"

          if [ -f CHANGELOG.md ]; then
            echo "$changelog" | cat - CHANGELOG.md > temp && mv temp CHANGELOG.md
          else
            echo "$changelog" > CHANGELOG.md
          fi

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add CHANGELOG.md
          git commit -m "Update CHANGELOG.md for v${version}" || echo "No changes to commit"
          git push origin main

      - name: Create GitHub Release
        uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.init.outputs.version }}
          release_name: v${{ needs.init.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(needs.init.outputs.version, '-dev') }}

      - name: Push version tag
        run: |
          git push origin v${{ needs.init.outputs.version }}
