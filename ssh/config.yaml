---
version: 2.0.0
slug: ssh-fish
name: Terminal & SSH - Fish edition
description: Allow logging in remotely to Home Assistant using SSH & Fish shell
url: https://github.com/computeralex92/ha-ssh-fish
arch:
  - aarch64
  - amd64
homeassistant: "2025.1.0"
hassio_api: true
hassio_role: manager
image: ghcr.io/computeralex92/ha-ssh-fish/ha-ssh-fish
ingress: true
init: false
timeout: 20
tmpfs: true
map:
  - addons:rw
  - all_addon_configs:rw
  - backup:ro
  - homeassistant_config:rw
  - media:rw
  - share:rw
  - ssl:ro
backup_exclude:
  - "*/.ssh/environment"
options:
  log_level: info
  ssh:
    username: root
    password: ""
    authorized_keys: []
    sftp: false
    compatibility_mode: false
    allow_agent_forwarding: false
    allow_remote_port_forwarding: false
    allow_tcp_forwarding: false
  packages: []
  init_commands: []
panel_icon: mdi:console
panel_title: Terminal
ports:
  22/tcp: null
ports_description:
  22/tcp: SSH Port
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  ssh:
    username: str
    password: password
    authorized_keys:
      - str
    sftp: bool
    compatibility_mode: bool
    allow_agent_forwarding: bool
    allow_remote_port_forwarding: bool
    allow_tcp_forwarding: bool
  packages:
    - str
  init_commands:
    - str
startup: services
