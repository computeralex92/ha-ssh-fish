---
version: 1.3.0
slug: ssh-fish
name: Terminal & SSH - Fish edition
description: Allow logging in remotely to Home Assistant using SSH & Fish shell
url: https://github.com/computeralex92/ha-ssh-fish
arch:
  - aarch64
  - amd64
homeassistant: "2025.1.0"
hassio_api: true
hassio_role: manager
image: ghcr.io/computeralex92/ha-ssh-fish/ha-ssh-fish
ingress: true
init: false
timeout: 20
tmpfs: true
map:
  - addons:rw
  - all_addon_configs:rw
  - backup:ro
  - homeassistant_config:rw
  - media:rw
  - share:rw
  - ssl:ro
options:
  authorized_keys: []
  password: ""
  apks: []
  server:
    tcp_forwarding: false
panel_icon: mdi:console
panel_title: Terminal
ports:
  22/tcp: null
ports_description:
  22/tcp: SSH Port
schema:
  authorized_keys:
    - str
  password: password
  apks:
    - str
  server:
    tcp_forwarding: bool
startup: services
