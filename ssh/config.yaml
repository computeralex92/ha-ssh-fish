---
version: 1.0.0
slug: ssh-fish
name: Terminal & SSH - Fish edition
description: Allow logging in remotely to Home Assistant using SSH & Fish shell
url: https://github.com/computeralex92/ha-ssh-fish
arch:
  - aarch64
  - amd64
audio: true
hassio_api: true
hassio_role: manager
host_dbus: true
image: computeralex92/ha-ssh-fish/ha-ssh-fish
ingress: true
init: false
map:
  - addons:rw
  - all_addon_configs:rw
  - backup:rw
  - homeassistant_config:rw
  - media:rw
  - share:rw
  - ssl:rw
options:
  authorized_keys: []
  password: ""
  apks: []
  server:
    tcp_forwarding: false
panel_icon: mdi:console
panel_title: Terminal
ports:
  22/tcp: null
schema:
  authorized_keys:
    - str
  password: password
  apks:
    - str
  server:
    tcp_forwarding: bool
startup: services
uart: true
